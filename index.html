<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="ใบลงเวลา" />
  <meta name="description" content="ระบบสร้างใบลงเวลาจากตารางเบิกและสแกนนิ้ว" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>ระบบสร้างใบลงเวลา</title>
  <style>
    :root { --primary:#0f766e; --primary-2:#14b8a6; --ink:#102a43; --muted:#627d98; --bg:#edf6f5; }
    * { box-sizing: border-box; }
    html, body { margin:0; height:100%; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans Thai", sans-serif; background:var(--bg); color:var(--ink); }
    body { min-height:100dvh; }
    .shell { min-height:100dvh; display:grid; grid-template-rows:auto 1fr; }
    header { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:10px 14px; background:#fff; border-bottom:1px solid #d7e6e4; box-shadow:0 1px 6px rgba(16,42,67,.08); z-index:2; }
    .brand { display:flex; align-items:center; min-width:0; gap:10px; }
    .badge { display:grid; place-items:center; width:36px; height:36px; border-radius:11px; background:linear-gradient(135deg,var(--primary),var(--primary-2)); color:#fff; font-size:20px; flex:0 0 auto; }
    .title { min-width:0; }
    .title strong { display:block; font-size:15px; line-height:1.25; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .title span { display:block; color:var(--muted); font-size:11px; margin-top:1px; }
    .actions { display:flex; align-items:center; gap:8px; }
    button, .linkbtn { appearance:none; border:1px solid #c6dedb; background:#fff; color:#155e75; cursor:pointer; padding:8px 10px; border-radius:9px; font:inherit; font-size:13px; text-decoration:none; line-height:1; }
    button:hover, .linkbtn:hover { background:#f0fdfa; }
    #status { font-size:12px; color:var(--muted); display:none; }
    main { position:relative; min-height:0; }
    iframe { width:100%; height:100%; min-height:calc(100dvh - 58px); border:0; display:block; background:white; }
    .loading { position:absolute; inset:0; z-index:3; display:grid; place-items:center; padding:24px; background:linear-gradient(180deg,#f7fffe 0%,#edf6f5 100%); transition:opacity .25s ease, visibility .25s ease; }
    .loading.hide { opacity:0; visibility:hidden; pointer-events:none; }
    .card { width:min(420px,100%); background:#fff; border:1px solid #d8e8e5; border-radius:18px; padding:24px; text-align:center; box-shadow:0 12px 35px rgba(15,118,110,.12); }
    .spin { width:38px; height:38px; border:4px solid #cce7e2; border-top-color:var(--primary); border-radius:50%; margin:0 auto 14px; animation:spin .9s linear infinite; }
    @keyframes spin { to{ transform:rotate(360deg); } }
    .card h1 { margin:0 0 8px; font-size:18px; }
    .card p { margin:0; color:var(--muted); font-size:14px; line-height:1.55; }
    .offline { margin-top:14px; display:none; color:#9a3412 !important; }
    .offline.show { display:block; }
    .fallback { margin-top:18px; display:inline-flex; }
    @media (max-width:640px) { .title span, #status { display:none; } header{padding:9px 10px;} .actions{gap:5px;} button,.linkbtn{padding:8px;} }
    @media print { header{display:none;} iframe{min-height:100vh;} }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="brand">
        <div class="badge" aria-hidden="true">🗓️</div>
        <div class="title">
          <strong>ระบบสร้างใบลงเวลา</strong>
          <span>ตารางเบิก + รายงานสแกนนิ้ว</span>
        </div>
      </div>
      <div class="actions">
        <span id="status"></span>
        <button id="reloadBtn" type="button" title="รีเฟรชระบบ">↻ รีเฟรช</button>
        <a class="linkbtn" id="directLink" href="#" target="_blank" rel="noopener">เปิดเต็มหน้า ↗</a>
      </div>
    </header>
    <main>
      <div class="loading" id="loading">
        <section class="card" aria-live="polite">
          <div class="spin" aria-hidden="true"></div>
          <h1>กำลังเปิดระบบสร้างใบลงเวลา</h1>
          <p>เชื่อมต่อกับ Google Apps Script…</p>
          <p class="offline" id="offlineMsg">ขณะนี้ออฟไลน์ กรุณาเชื่อมต่ออินเทอร์เน็ตแล้วลองใหม่</p>
          <a class="linkbtn fallback" id="fallbackLink" href="#" target="_blank" rel="noopener">เปิดระบบโดยตรง</a>
        </section>
      </div>
      <iframe id="appFrame" title="ระบบสร้างใบลงเวลา" referrerpolicy="strict-origin-when-cross-origin"></iframe>
    </main>
  </div>
  <script>
    // แก้ URL นี้เฉพาะกรณี Deploy GAS ใหม่เป็นคนละ URL
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyFf4QIXKhbNfgyG0r-B-BFrk88ozodlL2cFr3nl-Un6Olt2rGqJ2Vm095OfIa1YGdlmw/exec';
    const frame = document.getElementById('appFrame');
    const loading = document.getElementById('loading');
    const direct = document.getElementById('directLink');
    const fallback = document.getElementById('fallbackLink');
    const offline = document.getElementById('offlineMsg');
    const status = document.getElementById('status');

    function setOnlineState() {
      const isOnline = navigator.onLine;
      offline.classList.toggle('show', !isOnline);
      status.style.display = isOnline ? 'none' : 'inline';
      status.textContent = isOnline ? '' : 'ออฟไลน์';
    }
    function loadApp(force = false) {
      setOnlineState();
      loading.classList.remove('hide');
      const join = GAS_URL.includes('?') ? '&' : '?';
      frame.src = force ? GAS_URL + join + 'pwaRefresh=' + Date.now() : GAS_URL;
    }
    direct.href = GAS_URL;
    fallback.href = GAS_URL;
    frame.addEventListener('load', () => loading.classList.add('hide'));
    document.getElementById('reloadBtn').addEventListener('click', () => loadApp(true));
    window.addEventListener('online', () => { setOnlineState(); loadApp(true); });
    window.addEventListener('offline', setOnlineState);
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(console.warn));
    }
    loadApp();
  </script>
</body>
</html>
